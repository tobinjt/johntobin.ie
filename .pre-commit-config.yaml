#!/usr/bin/env -S "populate_pre_commit"
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  # managed-by-populate-pre-commit start: actionlint.yaml
  - repo: local
    hooks:
    - id: actionlint
      name: Run `actionlint`
      language: system
      types:
      - yaml
      exclude: dependabot.yml|.*.yaml$
      entry: actionlint
  # managed-by-populate-pre-commit end: actionlint.yaml
  # managed-by-populate-pre-commit start: conventional-pre-commit.yaml
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
    - id: conventional-pre-commit
      stages:
      - commit-msg
      args:
      - --verbose
  # managed-by-populate-pre-commit end: conventional-pre-commit.yaml
  # managed-by-populate-pre-commit start: hooks.yaml
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    - id: check-case-conflict
    - id: check-executables-have-shebangs
    - id: check-illegal-windows-names
    - id: check-merge-conflict
    - id: check-vcs-permalinks
    - id: check-yaml
    - id: destroyed-symlinks
    - id: fix-byte-order-marker
    - id: mixed-line-ending
  # managed-by-populate-pre-commit end: hooks.yaml
  # managed-by-populate-pre-commit start: keep-sorted.yaml
  - repo: https://github.com/google/keep-sorted
    rev: v0.8.0
    hooks:
    - id: keep-sorted
  # managed-by-populate-pre-commit end: keep-sorted.yaml
  # managed-by-populate-pre-commit start: markdownlint.yaml
  - repo: local
    hooks:
    - id: markdownlint
      name: Run `markdownlint`
      language: system
      types:
      - markdown
      exclude: CODE_OF_CONDUCT.md
      entry: markdownlint
  # managed-by-populate-pre-commit end: markdownlint.yaml
  # managed-by-populate-pre-commit start: meta.yaml
  - repo: meta
    hooks:
    - id: check-hooks-apply
  # managed-by-populate-pre-commit end: meta.yaml
  # managed-by-populate-pre-commit start: shellcheck.yaml
  - repo: local
    hooks:
    - id: shellcheck
      name: Run `shellcheck`
      language: system
      types:
      - shell
      entry: shellcheck -e SC1090 -e SC1091
  # managed-by-populate-pre-commit end: shellcheck.yaml
  # managed-by-populate-pre-commit start: spellcheck.yaml
  - repo: local
    hooks:
    - id: spellcheck
      stages:
      - commit-msg
      name: Check spelling
      language: system
      verbose: true
      entry: spell-check-wrapper
  # managed-by-populate-pre-commit end: spellcheck.yaml
  # managed-by-populate-pre-commit start: toml.yaml
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    - id: check-toml
  # managed-by-populate-pre-commit end: toml.yaml
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-symlinks
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: local
    hooks:
      - id: no-draft-posts
        name: Check for `draft = true`
        description: >-
          Hugo does not publish draft posts, prevent draft posts being committed
        language: pygrep
        types: [markdown]
        entry: ^draft.*=.*true
      - id: no-inconsistent-tags
        name: Check for inconsistent tag capitalisation
        description: >-
          When tags are inconsistently capitalised Hugo will use a random tag,
          causing unnecessary changes in output.  Prevent checking in
          inconsistent tags.
        language: script
        types: [markdown]
        pass_filenames: false
        entry: check-for-inconsistent-tags
      - id: hugo
        name: Check that hugo build succeeds
        language: system
        types_or: [markdown, toml]
        pass_filenames: false
        entry: hugo build
